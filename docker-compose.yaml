################################### 卷定义 ###################################
volumes:
  pansou-data:
    driver: local
    name: pansou-data

################################### 网络定义 ###################################
networks:
  app-network:
    driver: bridge
    name: app-network
    ipam:
      driver: default
      config:
        - subnet: ${NETWORK_SUBNET}/16
