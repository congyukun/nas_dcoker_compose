services:

  ################################### 一、影视核心（自动化+播放+整理）###################################
  # 1. Qbittorrent 下载器
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    hostname: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - UMASK_SET=022
    volumes:
      - ${MEDIA_PATH}:/downloads
      - ./qbittorrent/config:/config
    ports:
      - "${QBITTORRENT_WEBUI_PORT}:8080"
      - "${QBITTORRENT_BT_PORT}:6881"
      - "${QBITTORRENT_BT_PORT}:6881/udp"
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${QBITTORRENT_MEM_LIMIT}
        reservations:
          memory: ${QBITTORRENT_MEM_RESERVATION}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. MoviePilot v2（自动化媒体中心）
  moviepilot:
    image: jxxghp/moviepilot-v2:latest
    container_name: moviepilot-v2
    hostname: moviepilot-v2
    stdin_open: true
    tty: true
    ports:
      - "${MOVIEPILOT_NGINX_PORT}:3000"
      - "${MOVIEPILOT_API_PORT}:3001"
    volumes:
      - ${MEDIA_PATH}:/media
      - ./moviepilot/config:/config
      - ./moviepilot/core:/moviepilot/.cache/ms-playwright
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./qbittorrent/config/qBittorrent/BT_backup:/BT_backup
    environment:
      - NGINX_PORT=3000
      - PORT=3001
      - PUID=0
      - PGID=0
      - UMASK=000
      - TZ=${TZ}
      - SUPERUSER=${MOVIEPILOT_SUPERUSER}
      - SUPERUSER_PASSWORD=${MOVIEPILOT_SUPERUSER_PASSWORD}
      - DB_TYPE=postgresql
      - DB_POSTGRESQL_HOST=postgresql
      - DB_POSTGRESQL_PORT=5432
      - DB_POSTGRESQL_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESQL_USERNAME=${POSTGRES_USER}
      - DB_POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
      - CACHE_BACKEND_TYPE=redis
      - CACHE_BACKEND_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: ${MOVIEPILOT_MEM_LIMIT}
        reservations:
          memory: ${MOVIEPILOT_MEM_RESERVATION}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 3. PostgreSQL 数据库（MoviePilot 专用）
  postgresql:
    image: postgres:16-alpine
    container_name: postgresql
    hostname: postgresql
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=${TZ}
    volumes:
      - ./postgresql/data:/var/lib/postgresql/data
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${POSTGRESQL_MEM_LIMIT}
        reservations:
          memory: ${POSTGRESQL_MEM_RESERVATION}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 4. Redis（共享服务 - MoviePilot + PanCheck）
  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    volumes:
      - ./redis/data:/data
    command: redis-server --save 600 1 --requirepass ${REDIS_PASSWORD} --maxmemory ${REDIS_MAXMEMORY} --maxmemory-policy allkeys-lru
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT}
        reservations:
          memory: ${REDIS_MEM_RESERVATION}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 5. PgLoader（SQLite -> PostgreSQL 迁移工具，一次性使用）
  # pgloader:
  #   image: dimitri/pgloader:latest
  #   container_name: pgloader
  #   profiles:
  #     - migration
  #   volumes:
  #     - ./moviepilot/config:/mp_config
  #   command: >
  #     pgloader
  #     sqlite:///mp_config/user.db
  #     postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/${POSTGRES_DB}
  #   depends_on:
  #     postgresql:
  #       condition: service_healthy
  #   networks:
  #     - app-network

  # 6. Navidrome（音乐服务器）
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    hostname: navidrome
    environment:
      - TZ=${TZ}
      - ND_SCANSCHEDULE=0 3 * * *
      - ND_MAXSCANSPEED=10mbps
      - ND_LOGLEVEL=info
    volumes:
      - ${MUSIC_PATH}:/music:ro
      - ./navidrome/data:/data
    ports:
      - "${NAVIDROME_PORT}:4533"
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4533/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 7. Music-tag-Web（音乐标签编辑）
  music-tag:
    image: xhongc/music_tag_web:latest
    container_name: music-tag-web
    hostname: music-tag-web
    ports:
      - "${MUSIC_TAG_PORT}:8002"
    volumes:
      - ${MUSIC_PATH}:/app/media
      - ./music-tag-web/data:/app/data
      - ${MUSIC_PATH}/download:/app/download
    restart: always
    environment:
      - TZ=${TZ}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8002 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ################################### 二、实用工具（云盘+转存+搜索）###################################
  # 8. Quark-auto-save（夸克自动转存）
  quark-auto-save:
    image: cp0204/quark-auto-save:latest
    container_name: quark-auto-save
    hostname: quark-auto-save
    ports:
      - "${QUARK_PORT}:5005"
    environment:
      - WEBUI_USERNAME=${QUARK_WEBUI_USERNAME}
      - WEBUI_PASSWORD=${QUARK_WEBUI_PASSWORD}
      - TZ=${TZ}
    volumes:
      - ./storage/cloud/quark:/quark
      - ./quark-auto-save/config:/config
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5005 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 9. CloudSaver（云盘资源保存）
  cloudsaver:
    image: jiangrui1994/cloudsaver:latest
    container_name: cloud-saver
    hostname: cloud-saver
    ports:
      - "${CLOUDSAVER_PORT}:8008"
    volumes:
      - ./cloudsaver/data:/app/data
      - ./cloudsaver/config:/app/config
    environment:
      - TZ=${TZ}
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8008/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 10. PanCheck（网盘链接检测系统）
  pancheck:
    image: lampon/pancheck:latest
    container_name: pancheck
    hostname: pancheck
    ports:
      - "${PANCHECK_PORT}:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_MODE=release
      - SERVER_CORS_ORIGINS=*
      - DATABASE_TYPE=mysql
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_USER=root
      - DATABASE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DATABASE_DATABASE=${MYSQL_DATABASE}
      - DATABASE_CHARSET=utf8mb4
      - CHECKER_DEFAULT_CONCURRENCY=5
      - CHECKER_TIMEOUT=30
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=0
      - REDIS_INVALID_TTL=168
      - ADMIN_PASSWORD=${PANCHECK_ADMIN_PASSWORD}
      - TZ=${TZ}
    volumes:
      - ./pancheck/data:/app/data
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 11. MySQL（PanCheck 专用数据库）
  mysql:
    image: mysql:8.0
    container_name: mysql
    hostname: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
      - TZ=${TZ}
    volumes:
      - ./pancheck/mysql_data:/var/lib/mysql
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${MYSQL_MEM_LIMIT}
        reservations:
          memory: ${MYSQL_MEM_RESERVATION}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 12. PanSou（多网盘资源聚合搜索）
  pansou:
    image: ghcr.io/fish2018/pansou-web:latest
    container_name: pansou-app
    hostname: pansou-app
    labels:
      - "autoheal=true"
    ports:
      - "${PANSOU_HTTP_PORT}:80"
      - "${PANSOU_HTTPS_PORT}:443"
    environment:
      # 基础配置
      - DOMAIN=${PANSOU_DOMAIN}
      - PANSOU_PORT=${PANSOU_HTTP_PORT}
      - PANSOU_HOST=${PANSOU_HOST}
      
      # 数据目录配置
      - CACHE_PATH=/app/data/cache
      - LOG_PATH=/app/data/logs
      
      # 插件配置
      - ENABLED_PLUGINS=labi,zhizhen,shandian,duoduo,muou,wanou,hunhepan,jikepan,panwiki,pansearch,panta,qupansou,hdr4k,pan666,susu,thepiratebay,xuexizhinan,panyq,ouge,huban,cyg,erxiao,miaoso,fox4k,pianku,clmao,wuji,cldi,xiaozhang,libvio,leijing,xb6v,xys,ddys,hdmoli,yuhuage,u3c3,javdb,clxiong,jutoushe,sdso,xiaoji,xdyh,haisou,bixin,djgou,nyaa,xinjuc,aikanzy,qupanshe,xdpan,discourse,yunsou,ahhhhfs,nsgame,quark4k,quarksoo,sousou,ash,feikuai
      
      # Telegram频道配置
      - CHANNELS=tgsearchers4,Aliyun_4K_Movies,bdbdndn11,yunpanx,bsbdbfjfjff,yp123pan,sbsbsnsqq,yunpanxunlei,tianyifc,BaiduCloudDisk,txtyzy,peccxinpd,gotopan,PanjClub,kkxlzy,baicaoZY,MCPH01,MCPH02,MCPH03,bdwpzhpd,ysxb48,jdjdn1111,yggpan,MCPH086,zaihuayun,Q66Share,ucwpzy,shareAliyun,alyp_1,dianyingshare,Quark_Movies,XiangxiuNBB,ydypzyfx,ucquark,xx123pan,yingshifenxiang123,zyfb123,tyypzhpd,tianyirigeng,cloudtianyi,hdhhd21,Lsp115,oneonefivewpfx,qixingzhenren,taoxgzy,Channel_Shares_115,tyysypzypd,vip115hot,wp123zy,yunpan139,yunpan189,yunpanuc,yydf_hzl,leoziyuan,Q_dongman,yoyokuakeduanju,TG654TG,WFYSFX02,QukanMovie,yeqingjie_GJG666,movielover8888_film3,Baidu_netdisk,D_wusun,FLMdongtianfudi,KaiPanshare,QQZYDAPP,rjyxfx,PikPak_Share_Channel,btzhi,newproductsourcing,cctv1211,duan_ju,QuarkFree,yunpanNB,kkdj001,xxzlzn,pxyunpanxunlei,jxwpzy,kuakedongman,liangxingzhinan,xiangnikanj,solidsexydoll,guoman4K,zdqxm,kduanju,cilidianying,CBduanju,SharePanFilms,dzsgx,BooksRealm,Oscar_4Kmovies,douerpan,baidu_yppan,Q_jilupian,Netdisk_Movies,yunpanquark,ammmziyuan,ciliziyuanku,cili8888,jzmm_123pan,Q_dianying,domgmingapk,dianying4k,q_dianshiju,tgbokee,ucshare,godupan,gokuapan
      
      # 健康检查配置
      - HEALTH_CHECK_INTERVAL=30
      - HEALTH_CHECK_TIMEOUT=10
      - HEALTH_CHECK_RETRIES=3
      
      - TZ=${TZ}
    volumes:
      - pansou-data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 13. AutoHeal（自动健康检查和重启服务）
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: pansou-autoheal
    hostname: autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=60
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  # 14. Omnibox（Lampon 全能工具箱）
  omnibox:
    image: lampon/omnibox:latest
    container_name: omnibox
    hostname: omnibox
    restart: always
    ports:
      - "${OMNIBOX_PORT}:7023"
    volumes:
      - ./omnibox/config:/config
      - ./omnibox/data:/data
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7023 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ################################### 三、管理面板（Sun-Panel）###################################
  # 15. Sun-Panel（导航面板）
  sun-panel:
    image: hslr/sun-panel:latest
    container_name: sun-panel
    hostname: sun-panel
    volumes:
      - ./sunpanel/conf:/app/conf
      - /var/run/docker.sock:/var/run/docker.sock
      - ./sunpanel/runtime:/app/runtime
    ports:
      - "${SUNPANEL_PORT}:3002"
    restart: always
    environment:
      - TZ=${TZ}
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sunpanel.rule=Host(`sunpanel.local`)"
      - "traefik.http.services.sunpanel.loadbalancer.server.port=3002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ################################### 四、音乐服务（XiaoMusic + PlaylistDL）###################################
  # 16. XiaoMusic（小爱同学本地音乐服务）
  xiaomusic:
    image: ghcr.io/hanxi/xiaomusic:latest
    container_name: xiaomusic
    hostname: xiaomusic
    restart: always
    ports:
      - "${XIAOMUSIC_PORT}:8090"
    environment:
      - XIAOMUSIC_PUBLIC_PORT=${XIAOMUSIC_PORT}
      - TZ=${TZ}
    volumes:
      - ${MUSIC_PATH}:/app/music:ro
      - ./xiaomusic_conf:/app/conf
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8090 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 17. PlaylistDL（音乐歌单批量下载工具）
  playlistdl:
    image: tanner23456/playlistdl:v2
    container_name: playlistdl
    hostname: playlistdl
    restart: always
    ports:
      - "${PLAYLISTDL_PORT}:5000"
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - ADMIN_USERNAME=${PLAYLISTDL_ADMIN_USERNAME}
      - ADMIN_PASSWORD=${PLAYLISTDL_ADMIN_PASSWORD}
      - AUDIO_DOWNLOAD_PATH=/data
      - CLEANUP_INTERVAL=300
    volumes:
      - ${MUSIC_PATH}:/app/data
      - ./playlistdl/config:/config
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 18. Solara-Music（音乐流媒体服务）
  solara-music:
    image: xiaosahuogui/solara-music:latest
    container_name: solara-music
    hostname: solara-music
    restart: always
    ports:
      - "${SOLARA_MUSIC_PORT}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SOLARA_PASSWORD=${SOLARA_PASSWORD}
      - SESSION_SECRET=${SOLARA_SESSION_SECRET}
      - TZ=${TZ}
    volumes:
      - ./solara-music/logs:/app/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ################################### 五、网络代理（Clash）###################################
  # 19. Clash（网络代理）
  clash:
    image: metacubex/mihomo:latest
    container_name: clash-ui
    hostname: clash
    restart: always
    privileged: true
    ports:
      - "${CLASH_PROXY_PORT}:7890"
      - "${CLASH_UI_PORT}:1123"
      - "${CLASH_DNS_PORT}:1053"
    volumes:
      - ./clash-ui:/root/.config/mihomo
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=${TZ}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7890 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ################################### 注释的服务（按需启用）###################################
  # Jellyfin（VideoToolbox硬件加速）
  # jellyfin:
  #   image: jellyfin/jellyfin:latest
  #   container_name: jellyfin
  #   hostname: jellyfin
  #   environment:
  #     - TZ=${TZ}
  #     - PUID=${PUID}
  #     - PGID=${PGID}
  #   volumes:
  #     - ./jellyfin/config:/config
  #     - ${MEDIA_PATH}:/media:ro
  #     - ${MUSIC_PATH}:/music:ro
  #   ports:
  #     - "8096:8096"
  #     - "8920:8920"
  #   restart: always
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:8096 || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 4G
